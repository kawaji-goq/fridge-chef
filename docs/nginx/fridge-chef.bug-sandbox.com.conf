# /etc/nginx/sites-available/fridge-chef.bug-sandbox.com
# シンボリックリンクを sites-enabled に張る:
#   sudo ln -s /etc/nginx/sites-available/fridge-chef.bug-sandbox.com \
#              /etc/nginx/sites-enabled/

# HTTPS（SSL 取得後、certbot がこの上に書き加えるか、手動で追記）
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name fridge-chef.bug-sandbox.com;

    # SSL 証明書（certbot で取得）
    ssl_certificate /etc/letsencrypt/live/fridge-chef.bug-sandbox.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fridge-chef.bug-sandbox.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 静的アセットのキャッシュ等
    client_max_body_size 10M;
    access_log /var/log/nginx/fridge-chef.access.log;
    error_log /var/log/nginx/fridge-chef.error.log warn;

    # Docker コンテナにプロキシ（compose.prod.yaml で 127.0.0.1:8090 にバインド）
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 90s;
    }
}

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    listen [::]:80;
    server_name fridge-chef.bug-sandbox.com;

    # certbot 用 ACME チャレンジパス（HTTPS リダイレクトより前に置く）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}
